<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G検定Master | JDLA G検定対策アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fff8f5;
  --bg2: #ffffff;
  --card: #ffffff;
  --card2: #fff3ee;
  --primary: #cc2800;
  --primary-dark: #991e00;
  --gold: #b8860b;
  --gold-dim: rgba(184,134,11,0.12);
  --cyan: #0077cc;
  --success: #008844;
  --success-dim: rgba(0,136,68,0.1);
  --error: #cc2200;
  --error-dim: rgba(204,34,0,0.1);
  --warn: #cc7700;
  --text: #1c0800;
  --text-muted: #7a5a50;
  --border: rgba(204,40,0,0.14);
  --radius: 14px;
  --shadow: 0 2px 12px rgba(100,30,0,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'Inter','Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

/* SCREENS */
.screen { display:none; flex-direction:column; min-height:100vh; }
.screen.active { display:flex; }

/* HEADER */
.app-header {
  padding:16px 20px; display:flex; justify-content:center; align-items:center;
  gap:10px; position:relative;
  border-bottom:2px solid rgba(204,40,0,0.15); background:var(--bg2);
  position:sticky; top:0; z-index:50; box-shadow:0 2px 8px rgba(100,30,0,0.08);
}
.app-logo { font-size:22px; font-weight:900; background:linear-gradient(90deg,var(--primary),var(--gold),var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-size:200%; animation:logoShine 4s linear infinite; letter-spacing:0.5px; }
@keyframes logoShine { 0%{background-position:0%} 100%{background-position:200%} }
.app-badge { font-size:11px; background:rgba(204,40,0,0.1); color:var(--primary); border:1px solid rgba(204,40,0,0.3); padding:3px 10px; border-radius:20px; font-weight:700; }

/* HOME SCREEN */
.home-hero { text-align:center; padding:48px 24px 32px; }
.home-title { font-size:32px; font-weight:800; line-height:1.2; margin-bottom:10px; }
.home-title span { background:linear-gradient(90deg,var(--primary),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:900; }
.home-sub { color:var(--text-muted); font-size:14px; }

.stats-grid { display:flex; justify-content:center; gap:12px; padding:0 20px 24px; }
.stat-card { flex:1; max-width:110px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; box-shadow:var(--shadow); }
.stat-num { font-size:28px; font-weight:800; color:var(--primary); line-height:1; }
.stat-label { font-size:11px; color:var(--text-muted); margin-top:4px; }

.mode-section { padding:0 20px 32px; }
.section-title { font-size:13px; font-weight:700; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:14px; }
.mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.mode-btn {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px 16px; cursor:pointer; text-align:left; transition:all 0.2s;
  box-shadow:var(--shadow);
}
.mode-btn:hover { border-color:var(--primary); background:var(--card2); transform:translateY(-2px); }
.mode-btn.full { grid-column:1/-1; }
.mode-icon { font-size:28px; margin-bottom:10px; }
.mode-name { font-size:15px; font-weight:700; margin-bottom:4px; }
.mode-desc { font-size:12px; color:var(--text-muted); line-height:1.5; }

.cat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:14px; }
.cat-btn {
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:12px 14px; cursor:pointer; display:flex; align-items:center; gap:10px; transition:all 0.2s;
  box-shadow:var(--shadow);
}
.cat-btn:hover { border-color:var(--primary); }
.cat-btn.selected { border-color:var(--gold); background:rgba(255,215,0,0.08); }
.cat-icon { font-size:20px; flex-shrink:0; }
.cat-info { flex:1; }
.cat-name { font-size:13px; font-weight:600; }
.cat-count { font-size:11px; color:var(--text-muted); }
.cat-acc { font-size:12px; font-weight:700; color:var(--success); }

.start-btn {
  margin:0 20px 32px; padding:18px; border-radius:var(--radius);
  background:linear-gradient(135deg,var(--primary-dark),var(--primary),#e83500);
  color:white; font-size:16px; font-weight:700; border:2px solid var(--gold);
  cursor:pointer; width:calc(100% - 40px); transition:all 0.2s; letter-spacing:0.5px;
  box-shadow:0 0 18px rgba(204,40,0,0.35);
}
.start-btn:hover { opacity:0.9; }

/* QUIZ SCREEN */
.quiz-header { padding:14px 16px; display:flex; justify-content:space-between; align-items:center; gap:10px; border-bottom:1px solid var(--border); background:var(--bg2); position:sticky; top:0; z-index:40; }
.quiz-home-btn { background:none; border:1.5px solid var(--border); border-radius:8px; padding:6px 10px; font-size:16px; cursor:pointer; color:var(--text-muted); flex-shrink:0; transition:all 0.15s; }
.quiz-home-btn:hover { border-color:var(--primary); color:var(--primary); }

/* 再開バナー */
.resume-banner {
  margin:0 20px 16px; padding:14px 16px; border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(204,40,0,0.08),rgba(184,134,11,0.08));
  border:1.5px solid rgba(204,40,0,0.25); display:flex; align-items:center; gap:12px;
  box-shadow:var(--shadow);
}
.resume-banner-text { flex:1; }
.resume-banner-title { font-size:13px; font-weight:700; color:var(--primary); }
.resume-banner-sub { font-size:11px; color:var(--text-muted); margin-top:2px; }
.resume-btn { background:var(--primary); color:white; border:none; border-radius:8px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; flex-shrink:0; }
.resume-clear { background:none; border:none; color:var(--text-muted); font-size:18px; cursor:pointer; padding:4px; flex-shrink:0; }
.quiz-progress-wrap { flex:1; }
.quiz-progress-bar { height:6px; background:rgba(0,0,0,0.1); border-radius:3px; overflow:hidden; }
.quiz-progress-fill { height:100%; background:var(--primary); border-radius:3px; transition:width 0.3s; }
.quiz-count { font-size:13px; color:var(--text-muted); margin-bottom:6px; }
.timer-display { font-size:18px; font-weight:800; color:var(--gold); min-width:60px; text-align:right; }
.timer-display.warn { color:var(--error); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.quiz-body { padding:20px; flex:1; display:flex; flex-direction:column; }
.cat-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(74,158,255,0.12); border:1px solid rgba(74,158,255,0.25);
  color:var(--primary); font-size:12px; font-weight:600;
  padding:4px 12px; border-radius:20px; margin-bottom:16px;
}
.diff-badge { margin-left:8px; font-size:11px; font-weight:700; }
.diff-easy { color:var(--success); }
.diff-medium { color:var(--warn); }
.diff-hard { color:var(--error); }

.question-text { font-size:18px; font-weight:600; line-height:1.8; margin-bottom:24px; }
.term-link { color:var(--gold); border-bottom:1px dotted var(--gold); cursor:pointer; font-weight:700; }

.choices { display:flex; flex-direction:column; gap:10px; }
.choice-btn {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:var(--radius); padding:15px 18px;
  text-align:left; cursor:pointer; font-size:15px; line-height:1.6;
  transition:all 0.15s; display:flex; align-items:flex-start; gap:12px; color:var(--text);
  box-shadow:var(--shadow);
}
.choice-btn:hover:not(.disabled) { border-color:var(--primary); background:var(--card2); }
.choice-btn.selected { border-color:var(--primary); background:rgba(74,158,255,0.1); }
.choice-btn.correct { border-color:var(--success); background:var(--success-dim); }
.choice-btn.wrong { border-color:var(--error); background:var(--error-dim); }
.choice-btn.disabled { cursor:default; }
.choice-label {
  width:26px; height:26px; border-radius:50%; background:rgba(0,0,0,0.07);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; flex-shrink:0; margin-top:1px; color:var(--text);
}
.choice-btn.correct .choice-label { background:var(--success); color:#000; }
.choice-btn.wrong .choice-label { background:var(--error); color:#fff; }
.choice-btn.selected:not(.correct):not(.wrong) .choice-label { background:var(--primary); color:#fff; }

.submit-btn {
  margin-top:24px; padding:16px; border-radius:var(--radius);
  background:var(--primary); color:white; font-size:15px; font-weight:700;
  border:2px solid rgba(232,168,0,0.5); cursor:pointer; transition:all 0.2s;
  box-shadow:0 0 14px rgba(204,40,0,0.3);
}
.submit-btn:disabled { opacity:0.4; cursor:not-allowed; }
.submit-btn.next { background:var(--primary); color:#fff; border:2px solid var(--gold); box-shadow:0 0 14px rgba(204,40,0,0.25); }
.submit-btn:not(:disabled):hover { opacity:0.9; }

/* ANSWER FEEDBACK */
.answer-card {
  margin-top:20px; padding:20px; border-radius:var(--radius);
  border:1px solid var(--border); background:var(--card); box-shadow:var(--shadow);
}
.answer-result { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.answer-icon { font-size:24px; }
.answer-label { font-size:16px; font-weight:700; }
.answer-label.correct { color:var(--success); }
.answer-label.wrong { color:var(--error); }
.explanation { font-size:14px; color:var(--text); line-height:1.9; }

.terms-section { margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
.terms-title { font-size:11px; font-weight:700; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
.term-chip {
  display:inline-block; background:var(--gold-dim); border:1px solid rgba(255,215,0,0.2);
  color:var(--gold); font-size:12px; font-weight:600;
  padding:3px 10px; border-radius:20px; margin:3px 4px 3px 0; cursor:pointer;
}
.term-chip:hover { background:rgba(255,215,0,0.25); }

/* RESULTS SCREEN */
.results-body { padding:24px 20px; }
.score-hero { text-align:center; padding:32px 0; }
.score-circle {
  width:130px; height:130px; border-radius:50%;
  border:4px solid var(--primary); margin:0 auto 16px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--card2); box-shadow:0 0 20px rgba(204,40,0,0.2);
}
.score-pct { font-size:36px; font-weight:800; color:var(--primary); line-height:1; }
.score-sub { font-size:12px; color:var(--text-muted); }
.score-grade { font-size:20px; font-weight:800; margin-bottom:6px; }
.score-msg { font-size:14px; color:var(--text-muted); }

.results-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:20px 0; }
.result-stat { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; text-align:center; }
.result-stat .num { font-size:22px; font-weight:800; }
.result-stat .lbl { font-size:11px; color:var(--text-muted); margin-top:2px; }

.cat-results { margin:24px 0; }
.cat-result-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
.cat-result-name { font-size:13px; font-weight:600; min-width:100px; }
.cat-result-bar-wrap { flex:1; height:8px; background:rgba(0,0,0,0.1); border-radius:4px; overflow:hidden; }
.cat-result-bar { height:100%; border-radius:4px; transition:width 0.8s; }
.cat-result-score { font-size:13px; font-weight:700; min-width:45px; text-align:right; }

.results-actions { display:flex; flex-direction:column; gap:10px; margin-top:24px; }
.action-btn {
  padding:16px; border-radius:var(--radius); font-size:15px; font-weight:700;
  border:none; cursor:pointer; transition:all 0.2s;
}
.action-primary { background:linear-gradient(135deg,var(--primary-dark),var(--primary)); color:white; border:1.5px solid rgba(232,168,0,0.5); box-shadow:0 0 14px rgba(204,40,0,0.3); }
.action-secondary { background:var(--card); border:1px solid var(--border); color:var(--text); }
.action-btn:hover { opacity:0.9; }

/* REVIEW SCREEN */
.review-body { padding:20px; }
.review-item {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; margin-bottom:12px;
}
.review-q { font-size:14px; font-weight:600; margin-bottom:10px; line-height:1.5; }
.review-answers { display:flex; flex-direction:column; gap:6px; font-size:13px; }
.review-your { color:var(--error); }
.review-correct { color:var(--success); }
.review-exp { font-size:12px; color:var(--text-muted); margin-top:10px; line-height:1.6; border-top:1px solid var(--border); padding-top:10px; }

/* STATS SCREEN */
.stats-body { padding:20px; }
.stats-overview { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:24px; }
.stats-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
.stats-card-title { font-size:11px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
.stats-card-val { font-size:28px; font-weight:800; color:var(--primary); }

/* TERM POPUP */
.popup-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7);
  z-index:200; display:flex; align-items:flex-end; justify-content:center;
  backdrop-filter:blur(4px);
}
.popup-overlay.hidden { display:none; }
.popup-sheet {
  background:var(--card); border-radius:24px 24px 0 0;
  padding:24px; width:100%; max-width:500px;
  border-top:3px solid var(--primary);
  animation:slideUp 0.25s ease; box-shadow:0 -4px 24px rgba(100,30,0,0.15);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.popup-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
.popup-term { font-size:20px; font-weight:800; color:var(--gold); margin-bottom:8px; }
.popup-def { font-size:14px; line-height:1.8; color:var(--text); }
.popup-close { margin-top:20px; padding:14px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:14px; font-weight:600; cursor:pointer; width:100%; }

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg2); border-top:2px solid rgba(204,40,0,0.15);
  display:flex; justify-content:space-around; padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index:100; box-shadow:0 -2px 10px rgba(100,30,0,0.08);
}
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px; cursor:pointer; background:none; border:none; color:#bba090; font-size:10px; font-weight:600; transition:color 0.2s; }
.nav-btn.active { color:var(--gold); }
.nav-btn .icon { font-size:22px; }

.pb-nav { padding-bottom:72px; }

/* AI侍くん MASCOT */
.samurai-hero {
  display:flex; flex-direction:row; align-items:center;
  padding:20px 0 20px 20px; min-height:280px; overflow:hidden;
  background:linear-gradient(135deg, rgba(255,240,235,0.6) 0%, rgba(255,255,255,0) 60%);
}
.samurai-text {
  flex:1; min-width:0; z-index:3; display:flex; flex-direction:column;
  justify-content:center; padding-right:8px;
}
.samurai-float {
  flex-shrink:0; width:50%; display:flex;
  align-items:center; justify-content:center;
  animation:floatBob 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes floatBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.samurai-float img {
  width:100%; max-width:300px; height:auto;
  object-fit:contain;
  filter:drop-shadow(3px 6px 16px rgba(204,40,0,0.4)) drop-shadow(0 0 28px rgba(184,134,11,0.25));
}
.home-title { font-size:26px; font-weight:800; line-height:1.25; margin-bottom:8px; }
.home-title span { background:linear-gradient(90deg,var(--primary),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:900; }
.speech-bubble {
  background:var(--card); border:1.5px solid rgba(184,134,11,0.35);
  border-radius:12px; padding:10px 14px; display:inline-block;
  font-size:13px; font-weight:600; color:var(--text); line-height:1.5;
  box-shadow:var(--shadow); margin-bottom:6px;
}
.home-sub { color:var(--text-muted); font-size:12px; margin-top:4px; }

@media (min-width:500px) {
  .mode-grid { grid-template-columns:repeat(3,1fr); }
  .mode-btn.full { grid-column:auto; }
  .stats-grid { grid-template-columns:repeat(5,1fr); }
}
</style>
</head>
<body>

<!-- ===== HOME SCREEN ===== -->
<div class="screen active" id="screen-home">
  <header class="app-header">
    <span class="app-logo">G検定Master</span>
    <span class="app-badge">JDLA準拠</span>
  </header>
  <div class="pb-nav" style="overflow-y:auto">
    <div class="samurai-hero">
      <div class="samurai-float">
        <img src="ai-samurai-transparent.png" alt="AI侍くん" onerror="this.src='ai-samurai.png'">
      </div>
      <div class="samurai-text">
        <div class="home-title">🧠 G検定<span>合格</span>への最短ルート</div>
        <div class="speech-bubble" id="samurai-speech">一緒にG検定を<span style="color:var(--primary);font-weight:800">合格</span>しよう！🔥</div>
        <div class="home-sub">2026年7月試験対応 · JDLAシラバス完全準拠</div>
      </div>
    </div>
    <div id="resume-banner-wrap"></div>
    <div class="stats-grid" id="home-stats">
      <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">総問題数</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-acc">—</div><div class="stat-label">正答率</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">連続正解</div></div>
    </div>

    <div class="mode-section">
      <div class="section-title">学習モード</div>
      <div class="mode-grid">
        <button class="mode-btn" onclick="startMode('study')">
          <div class="mode-icon">📚</div>
          <div class="mode-name">学習モード</div>
          <div class="mode-desc">解答後すぐに解説を確認しながら学習</div>
        </button>
        <button class="mode-btn" onclick="startMode('exam')">
          <div class="mode-icon">⏱️</div>
          <div class="mode-name">本番模擬試験</div>
          <div class="mode-desc">100分タイマー・本番形式で全問挑戦</div>
        </button>
        <button class="mode-btn full" onclick="startMode('weak')">
          <div class="mode-icon">🎯</div>
          <div class="mode-name">弱点集中モード</div>
          <div class="mode-desc">直近で間違えた問題・正答率が低い分野を重点的に出題</div>
        </button>
      </div>
    </div>

    <div class="mode-section">
      <div class="section-title">分野別学習</div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
    <button class="start-btn" id="start-btn" onclick="startSelected()">学習スタート ▶</button>
  </div>
</div>

<!-- ===== QUIZ SCREEN ===== -->
<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <button class="quiz-home-btn" onclick="pauseAndGoHome()" title="ホームへ戻る">🏠</button>
    <div class="quiz-progress-wrap">
      <div class="quiz-count" id="quiz-count">1 / 30</div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-fill" style="width:0%"></div></div>
    </div>
    <div class="timer-display" id="timer-display" style="display:none">100:00</div>
  </div>
  <div class="quiz-body pb-nav" style="overflow-y:auto">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <div class="cat-badge" id="quiz-cat-badge">🧠 ディープラーニング</div>
      <span class="diff-badge" id="quiz-diff"></span>
    </div>
    <div class="question-text" id="quiz-question"></div>
    <div class="choices" id="quiz-choices"></div>
    <button class="submit-btn" id="quiz-submit" onclick="submitAnswer()" disabled>回答する</button>
    <div id="answer-feedback" style="display:none">
      <div class="answer-card" id="answer-card">
        <div class="answer-result">
          <span class="answer-icon" id="answer-icon"></span>
          <span class="answer-label" id="answer-label"></span>
        </div>
        <div class="explanation" id="answer-explanation"></div>
        <div class="terms-section" id="terms-section" style="display:none">
          <div class="terms-title">📖 用語解説</div>
          <div id="terms-chips"></div>
        </div>
      </div>

/* ===================================================
   APP STATE
   =================================================== */
let appState = {
  mode: 'study',
  selectedCats: [],
  queue: [],
  current: 0,
  selected: -1,
  answered: false,
  results: [],
  startTime: null,
  timerInterval: null,
  timerSeconds: 6000
};

let storage = {
  answered: {},  // {qId: {correct:bool, count:int}}
  streak: 0,
  totalAnswered: 0,
  totalCorrect: 0
};

function loadStorage() {
  try {
    const s = localStorage.getItem('gkentei_v1');
    if (s) storage = JSON.parse(s);
  } catch(e) {}
}
function saveStorage() {
  try { localStorage.setItem('gkentei_v1', JSON.stringify(storage)); } catch(e) {}
}

/* ===================================================
   SESSION SAVE / RESUME
   =================================================== */
const SESSION_KEY = 'gkentei_session_v1';

function saveSession() {
  if (!appState.queue || appState.queue.length === 0) return;
  const session = {
    queueIds: appState.queue.map(q => q.id),
    current: appState.current,
    results: appState.results,
    mode: appState.mode,
    timerSeconds: appState.timerSeconds || null,
    savedAt: Date.now()
  };
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(session)); } catch(e) {}
}

function loadSession() {
  try {
    const s = localStorage.getItem(SESSION_KEY);
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}

function pauseAndGoHome() {
  if (appState.queue && appState.queue.length > 0 && appState.current < appState.queue.length) {
    saveSession();
    if (appState.timerInterval) clearInterval(appState.timerInterval);
  }
  showScreen('home');
  renderHome();
}

function resumeSession() {
  const session = loadSession();
  if (!session) return;
  appState.queue = session.queueIds.map(id => QUESTIONS.find(q => q.id === id)).filter(Boolean);
  appState.current = session.current;
  appState.results = session.results || [];
  appState.mode = session.mode;
  appState.selected = -1;
  appState.answered = false;
  if (session.mode === 'exam' && session.timerSeconds > 0) {
    appState.timerSeconds = session.timerSeconds;
    startTimer();
  } else {
    stopTimer();
  }
  showScreen('quiz', false);
  renderQuestion();
}

function renderResumeBanner() {
  const wrap = document.getElementById('resume-banner-wrap');
  if (!wrap) return;
  const session = loadSession();
  if (!session || session.current >= session.queueIds.length) {
    wrap.innerHTML = ''; return;
  }
  const modeLabel = {study:'学習モード', exam:'模擬試験', weak:'弱点集中'}[session.mode] || session.mode;
  const prog = `${session.current + 1} / ${session.queueIds.length}`;
  wrap.innerHTML = `
    <div class="resume-banner">
      <div style="font-size:24px">📌</div>
      <div class="resume-banner-text">
        <div class="resume-banner-title">前回の続きがあります</div>
        <div class="resume-banner-sub">${modeLabel} · 問題 ${prog}</div>
      </div>
      <button class="resume-btn" onclick="resumeSession()">再開 ▶</button>
      <button class="resume-clear" onclick="clearSession();renderResumeBanner()" title="削除">✕</button>
    </div>`;
}

/* ===================================================
   INIT
   =================================================== */
loadStorage();
renderHome();
document.getElementById('start-btn').textContent = '学習スタート ▶';

function renderHome() {
  renderResumeBanner();
  document.getElementById('stat-total').textContent = storage.totalAnswered || 0;
  const acc = storage.totalAnswered > 0 ? Math.round(storage.totalCorrect/storage.totalAnswered*100)+'%' : '—';
  document.getElementById('stat-acc').textContent = acc;
  document.getElementById('stat-streak').textContent = storage.streak || 0;

  const catGrid = document.getElementById('cat-grid');
  const cats = [...new Set(QUESTIONS.map(q=>q.cat))];
  catGrid.innerHTML = cats.map(cat => {
    const catQs = QUESTIONS.filter(q=>q.cat===cat);
    const done = catQs.filter(q=>storage.answered[q.id]);
    const correct = catQs.filter(q=>storage.answered[q.id]?.correct);
    const accStr = done.length > 0 ? Math.round(correct.length/done.length*100)+'%' : '未挑戦';
    const icon = catQs[0]?.icon || '📋';
    const selected = appState.selectedCats.includes(cat);
    return `<button class="cat-btn ${selected?'selected':''}" onclick="toggleCat('${cat}')">
      <span class="cat-icon">${icon}</span>
      <div class="cat-info">
        <div class="cat-name">${cat}</div>
        <div class="cat-count">${catQs.length}問 · ${accStr}</div>
      </div>
    </button>`;
  }).join('');
}

function toggleCat(cat) {
  const i = appState.selectedCats.indexOf(cat);
  if (i >= 0) appState.selectedCats.splice(i, 1);
  else appState.selectedCats.push(cat);
  renderHome();
}

/* ===================================================
   MODES
   =================================================== */
function startMode(mode, reviewMode=false) {
  appState.mode = mode;
  let pool = [...QUESTIONS];

  if (reviewMode) {
    pool = QUESTIONS.filter(q => storage.answered[q.id] && !storage.answered[q.id].correct);
    if (pool.length === 0) { alert('復習する問題がありません！全問正解しています🎉'); return; }
  } else if (mode === 'weak') {
    pool = QUESTIONS.filter(q => {
      const r = storage.answered[q.id];
      return !r || !r.correct;
    });
    if (pool.length === 0) pool = [...QUESTIONS];
  }

  if (appState.selectedCats.length > 0 && !reviewMode) {
    pool = pool.filter(q => appState.selectedCats.includes(q.cat));
    if (pool.length === 0) { alert('選択した分野に問題がありません。'); return; }
  }

  appState.queue = shuffle(pool);
  appState.current = 0;
  appState.results = [];
  appState.startTime = Date.now();
  appState.selected = -1;
  appState.answered = false;

  if (mode === 'exam') {
    appState.timerSeconds = 6000;
    startTimer();
  } else {
    stopTimer();
  }

  showScreen('quiz', false);
  renderQuestion();
}

function startSelected() {
  startMode(appState.mode || 'study');
}

/* ===================================================
   QUIZ ENGINE
   =================================================== */
function renderQuestion() {
  const q = appState.queue[appState.current];
  if (!q) { showResults(); return; }

  const total = appState.queue.length;
  const pct = (appState.current / total * 100).toFixed(0);

  document.getElementById('quiz-count').textContent = `${appState.current+1} / ${total}`;
  document.getElementById('quiz-fill').style.width = pct + '%';
  document.getElementById('quiz-cat-badge').innerHTML = `${q.icon} ${q.cat}`;
  const diffEl = document.getElementById('quiz-diff');
  const diffMap = {easy:['易',  'diff-easy'], medium:['中', 'diff-medium'], hard:['難', 'diff-hard']};
  const [label, cls] = diffMap[q.diff] || ['中','diff-medium'];
  diffEl.textContent = label;
  diffEl.className = `diff-badge ${cls}`;

  document.getElementById('quiz-question').textContent = q.q;

  const choicesEl = document.getElementById('quiz-choices');
  choicesEl.innerHTML = q.c.map((c,i) => `
    <button class="choice-btn" onclick="selectChoice(${i})">
      <span class="choice-label">${['A','B','C','D'][i]}</span>
      <span>${c.substring(3)}</span>
    </button>`).join('');

  document.getElementById('answer-feedback').style.display = 'none';
  const submitBtn = document.getElementById('quiz-submit');
  submitBtn.style.display = 'block';
  submitBtn.disabled = true;
  submitBtn.textContent = '回答する';
  submitBtn.className = 'submit-btn';

  appState.selected = -1;
  appState.answered = false;

  document.querySelector('#screen-quiz .quiz-body').scrollTop = 0;
}

function selectChoice(i) {
  if (appState.answered) return;
  appState.selected = i;
  document.querySelectorAll('.choice-btn').forEach((b,idx) => {
    b.classList.toggle('selected', idx === i);
  });
  document.getElementById('quiz-submit').disabled = false;
}

function submitAnswer() {
  if (appState.selected < 0 || appState.answered) return;
  appState.answered = true;

  const q = appState.queue[appState.current];
  const correct = appState.selected === q.ans;

  // Update stats
  if (!storage.answered[q.id]) storage.answered[q.id] = {correct:false, count:0};
  storage.answered[q.id].count++;
  storage.answered[q.id].correct = correct;
  storage.totalAnswered = (storage.totalAnswered||0) + 1;
  if (correct) {
    storage.totalCorrect = (storage.totalCorrect||0) + 1;
    storage.streak = (storage.streak||0) + 1;
  } else {
    storage.streak = 0;
  }
  saveStorage();

  appState.results.push({q, selected: appState.selected, correct});

  // Show choices result
  document.querySelectorAll('.choice-btn').forEach((b,i) => {
    b.classList.add('disabled');
    if (i === q.ans) b.classList.add('correct');
    else if (i === appState.selected && !correct) b.classList.add('wrong');
  });

  // Show feedback
  document.getElementById('answer-icon').textContent = correct ? '✅' : '❌';
  document.getElementById('answer-label').textContent = correct ? '正解！' : `不正解 — 正解は${['A','B','C','D'][q.ans]}`;
  document.getElementById('answer-label').className = `answer-label ${correct?'correct':'wrong'}`;
  document.getElementById('answer-explanation').textContent = q.exp;

  // Terms
  const termsEl = document.getElementById('terms-chips');
  if (q.terms && q.terms.length > 0) {
    document.getElementById('terms-section').style.display = 'block';
    termsEl.innerHTML = q.terms.map(t =>
      `<span class="term-chip" onclick="showTerm('${t}')">${t}</span>`
    ).join('');
  } else {
    document.getElementById('terms-section').style.display = 'none';
  }

  document.getElementById('answer-feedback').style.display = 'block';
  document.getElementById('quiz-submit').style.display = 'none';

  const isLast = appState.current >= appState.queue.length - 1;
  document.getElementById('quiz-next').textContent = isLast ? '結果を見る →' : '次の問題 →';
}

function nextQuestion() {
  appState.current++;
  if (appState.current >= appState.queue.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

/* ===================================================
   TIMER
   =================================================== */
function startTimer() {
  stopTimer();
  const timerEl = document.getElementById('timer-display');
  timerEl.style.display = 'block';
  appState.timerSeconds = 6000;
  updateTimerDisplay();
  appState.timerInterval = setInterval(() => {
    appState.timerSeconds--;
    updateTimerDisplay();
    if (appState.timerSeconds <= 0) { stopTimer(); showResults(); }
    if (appState.timerSeconds <= 300) timerEl.classList.add('warn');
  }, 1000);
}
function stopTimer() {
  if (appState.timerInterval) { clearInterval(appState.timerInterval); appState.timerInterval = null; }
  document.getElementById('timer-display').style.display = 'none';
}
function updateTimerDisplay() {
  const m = Math.floor(appState.timerSeconds/60).toString().padStart(2,'0');
  const s = (appState.timerSeconds%60).toString().padStart(2,'0');
  document.getElementById('timer-display').textContent = `${m}:${s}`;
}

/* ===================================================
   RESULTS
   =================================================== */
function showResults() {
  stopTimer();
  clearSession();
  const results = appState.results;
  const correct = results.filter(r=>r.correct).length;
  const total = results.length;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  const elapsed = Math.round((Date.now() - appState.startTime) / 1000);
  const em = Math.floor(elapsed/60).toString().padStart(2,'0');
  const es = (elapsed%60).toString().padStart(2,'0');

  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-fraction').textContent = `${correct} / ${total}`;

  let grade, msg;
  if (pct >= 90) { grade = '🏆 Sランク'; msg = '素晴らしい！合格圏内です'; }
  else if (pct >= 70) { grade = '🥇 Aランク'; msg = '合格ライン到達！'; }
  else if (pct >= 50) { grade = '🥈 Bランク'; msg = 'もう少し！弱点を強化しましょう'; }
  else { grade = '📚 要学習'; msg = '基礎から丁寧に見直しましょう'; }

  document.getElementById('res-grade').textContent = grade;
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = total - correct;
  document.getElementById('res-time').textContent = `${em}:${es}`;

  // Category breakdown
  const cats = [...new Set(results.map(r=>r.q.cat))];
  const catHtml = cats.map(cat => {
    const catR = results.filter(r=>r.q.cat===cat);
    const catC = catR.filter(r=>r.correct).length;
    const catPct = Math.round(catC/catR.length*100);
    const color = catPct >= 70 ? 'var(--success)' : catPct >= 50 ? 'var(--warn)' : 'var(--error)';
    const icon = catR[0]?.q.icon || '📋';
    return `<div class="cat-result-row">
      <div class="cat-result-name">${icon} ${cat}</div>
      <div class="cat-result-bar-wrap"><div class="cat-result-bar" style="width:${catPct}%;background:${color}"></div></div>
      <div class="cat-result-score" style="color:${color}">${catC}/${catR.length}</div>
    </div>`;
  }).join('');
  document.getElementById('cat-results').innerHTML = catHtml;

  showScreen('results', false);
  renderHome();
}

/* ===================================================
   STATS SCREEN
   =================================================== */
function renderStats() {
  const cats = [...new Set(QUESTIONS.map(q=>q.cat))];
  const totalPct = storage.totalAnswered > 0 ? Math.round(storage.totalCorrect/storage.totalAnswered*100) : 0;
  let html = `<div class="stats-overview">
    <div class="stats-card"><div class="stats-card-title">総解答数</div><div class="stats-card-val">${storage.totalAnswered||0}</div></div>
    <div class="stats-card"><div class="stats-card-title">総正答率</div><div class="stats-card-val" style="color:${totalPct>=70?'var(--success)':'var(--warn)'}">${storage.totalAnswered>0?totalPct+'%':'—'}</div></div>
    <div class="stats-card"><div class="stats-card-title">連続正解</div><div class="stats-card-val" style="color:var(--gold)">${storage.streak||0}</div></div>
    <div class="stats-card"><div class="stats-card-title">習得済み</div><div class="stats-card-val">${Object.values(storage.answered||{}).filter(v=>v.correct).length}</div></div>
  </div>
  <div class="section-title" style="margin-bottom:14px">分野別進捗</div>`;

  html += cats.map(cat => {
    const catQs = QUESTIONS.filter(q=>q.cat===cat);
    const done = catQs.filter(q=>storage.answered[q.id]);
    const correct = catQs.filter(q=>storage.answered[q.id]?.correct);
    const pct = done.length > 0 ? Math.round(correct.length/done.length*100) : 0;
    const color = pct>=70?'var(--success)':pct>=50?'var(--warn)':'var(--primary)';
    const icon = catQs[0]?.icon || '📋';
    return `<div class="stats-card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-weight:700">${icon} ${cat}</div>
        <div style="font-size:18px;font-weight:800;color:${color}">${done.length>0?pct+'%':'—'}</div>
      </div>
      <div style="height:8px;background:rgba(0,0,0,0.1);border-radius:4px;overflow:hidden;margin-bottom:6px">
        <div style="height:100%;width:${pct}%;background:${color};border-radius:4px;transition:width 0.8s"></div>
      </div>
      <div style="font-size:12px;color:var(--text-muted)">${correct.length}/${catQs.length}問正解 · ${done.length}問解答済み</div>
    </div>`;
  }).join('');

  document.getElementById('stats-body').innerHTML = html;
}

/* ===================================================
   TERM POPUP
   =================================================== */
function showTerm(term) {
  const def = ALL_TERMS[term] || '定義を準備中です。';
  document.getElementById('popup-term-title').textContent = term;
  document.getElementById('popup-term-def').textContent = def;
  document.getElementById('term-popup').classList.remove('hidden');
}
function closePopup(e) {
  if (!e || e.target.id === 'term-popup' || e.target.className === 'popup-close') {
    document.getElementById('term-popup').classList.add('hidden');
  }
}

/* ===================================================
   NAVIGATION
   =================================================== */
function showScreen(name, updateNav=true) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');

  const bottomNav = document.getElementById('bottom-nav');
  const showNavScreens = ['home','stats'];
  bottomNav.style.display = showNavScreens.includes(name) ? 'flex' : 'none';

  if (updateNav) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('nav-'+name);
    if (btn) btn.classList.add('active');
  }
}

function resetStats() {
  if (!confirm('全ての学習データをリセットしますか？')) return;
  storage = {answered:{}, streak:0, totalAnswered:0, totalCorrect:0};
  saveStorage();
  renderStats();
  renderHome();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
